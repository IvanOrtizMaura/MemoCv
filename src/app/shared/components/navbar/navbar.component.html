@if (isLoggedIn()) {
  <nav class="navbar">
    <div class="navbar-container">
      <a routerLink="/galeria" class="navbar-brand">
        <div class="brand-logo">
          <span class="brand-title">MemoCV</span>
          <span class="brand-tagline">Fotos de CV</span>
        </div>
      </a>

      <div class="navbar-links">
        <a routerLink="/galeria" routerLinkActive="active" class="nav-link">Galería</a>
        <a routerLink="/register" routerLinkActive="active" class="nav-link">Nuevo Registro</a>
      </div>

      <div class="navbar-actions">
        <button class="logout-button" (click)="onLogout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Cerrar sesión
        </button>
      </div>
    </div>
  </nav>
}
